services:
  app-db:
    image: postgres:16
    environment:
      POSTGRES_DB: chat_app
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    ports:
      - "5433:5432"
    volumes:
      - app_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d chat_app"]
      interval: 5s
      timeout: 5s
      retries: 10

  business-db:
    image: postgres:16
    environment:
      POSTGRES_DB: business
      POSTGRES_USER: business_user
      POSTGRES_PASSWORD: business_password
    ports:
      - "5434:5432"
    volumes:
      - business_db_data:/var/lib/postgresql/data
      - ./sample_db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U business_user -d business"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      app-db:
        condition: service_healthy
      business-db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  app_db_data:
  business_db_data:
  qdrant_data:
